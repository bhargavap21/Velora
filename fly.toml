app = "velora-execution-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "velora_data"
  destination = "/app/execution_env/data_cache"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
